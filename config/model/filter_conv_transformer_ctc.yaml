# @package _global_
module:
  _target_: emg2qwerty.lightning.FilterConvTransformerCTCModule
  num_freq_bins: 33 # freq = n_fft // 2 + 1
  in_features: 528
  mlp_features: [384]
  block_channels: [24, 24, 24, 24]
  kernel_width: 32
  num_heads: 4
  num_layers: 4
  dropout: 0.1


datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
